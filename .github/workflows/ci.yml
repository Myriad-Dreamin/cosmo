# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: cosmo::ci
on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'sbt'
    - uses: sbt/setup-sbt@v1
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'yarn'
    # packages/cosmo tests are reference-only and skipped in build.sbt.
    # cosmo0/test owns active cosmo0 and packages/cosmoc validation.
    - name: Run cosmo0 and cosmoc Scala tests
      run: sbt 'cosmo0/test'
    - name: Run CLI tests
      run: node --test cmd/cosmo/*.test.mjs
    - name: Run cosmoc bootstrap fixed-point test
      run: yarn test:bootstrap
    - name: Build cosmoc release artifact
      run: |
        mkdir -p target/dist target/release/cosmoc-linux-x64
        COSMO_OUTPUT=target/dist/cosmoc ./scripts/build.sh
        target/dist/cosmoc --version
        cp target/dist/cosmoc target/release/cosmoc-linux-x64/cosmoc
        tar -C target/release -czf target/release/cosmoc-linux-x64.tar.gz cosmoc-linux-x64
        sha256sum target/release/cosmoc-linux-x64.tar.gz > target/release/cosmoc-linux-x64.tar.gz.sha256
    - name: Upload cosmoc artifact
      uses: actions/upload-artifact@v4
      with:
        name: cosmoc-linux-x64
        path: |
          target/release/cosmoc-linux-x64.tar.gz
          target/release/cosmoc-linux-x64.tar.gz.sha256

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Download cosmoc artifact
      uses: actions/download-artifact@v4
      with:
        name: cosmoc-linux-x64
        path: artifacts
    - name: Install parse-changelog
      uses: taiki-e/install-action@parse-changelog
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Generate release notes
      run: node scripts/draft-release.mjs "$GITHUB_REF_NAME" --artifacts artifacts --output target/release-notes.md
    - name: Publish GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        prerelease_flag=""
        if [[ "$GITHUB_REF_NAME" == *-* ]]; then
          prerelease_flag="--prerelease"
        fi

        if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
          gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file target/release-notes.md $prerelease_flag
        else
          gh release create "$GITHUB_REF_NAME" artifacts/* --title "$GITHUB_REF_NAME" --notes-file target/release-notes.md $prerelease_flag
        fi
