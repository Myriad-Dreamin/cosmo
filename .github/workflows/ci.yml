# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: cosmo::ci
on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'sbt'
    - uses: sbt/setup-sbt@v1
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'yarn'
    # packages/cosmo tests are reference-only and skipped in build.sbt.
    # cosmo0/test owns active cosmo0 and packages/cosmoc validation.
    - name: Run cosmo0 and cosmoc Scala tests
      run: sbt 'cosmo0/test'
    - name: Run CLI tests
      run: node --test cmd/cosmo/*.test.mjs
